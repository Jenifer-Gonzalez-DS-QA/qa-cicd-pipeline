name: QA Pipeline — API Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * 1-5'   # Lunes a viernes a las 8am UTC
  workflow_dispatch:          # Ejecución manual desde GitHub UI

jobs:

  # ── Job 1: Smoke Tests (rápidos y críticos) ──────────────────────────────
  smoke-tests:
    name: 🔥 Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crear carpeta de reportes
        run: mkdir -p reports

      - name: Ejecutar smoke tests
        run: pytest -m smoke -v --tb=short --html=reports/smoke-report.html --self-contained-html

      - name: Subir reporte smoke
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: reports/smoke-report.html

  # ── Job 2: Regresión completa (solo si smoke pasa) ───────────────────────
  regression-tests:
    name: 🔄 Regression Suite
    runs-on: ubuntu-latest
    needs: smoke-tests

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crear carpeta de reportes
        run: mkdir -p reports

      - name: Ejecutar suite de regresión
        run: pytest -m regression -v --tb=short --html=reports/regression-report.html --self-contained-html

      - name: Subir reporte regresión
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-report
          path: reports/regression-report.html

  # ── Job 3: Performance (solo si smoke pasa) ───────────────────────────────
  performance-tests:
    name: ⚡ Performance Tests
    runs-on: ubuntu-latest
    needs: smoke-tests

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crear carpeta de reportes
        run: mkdir -p reports

      - name: Ejecutar pruebas de performance
        run: pytest -m performance -v --tb=short --html=reports/performance-report.html --self-contained-html

      - name: Subir reporte performance
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-report
          path: reports/performance-report.html

  # ── Job 4: Consolidar todos los reportes ─────────────────────────────────
  consolidate:
    name: 📊 Consolidar Resultados
    runs-on: ubuntu-latest
    needs: [smoke-tests, regression-tests, performance-tests]
    if: always()

    steps:
      - name: Descargar todos los reportes
        uses: actions/download-artifact@v4
        with:
          path: all-reports/

      - name: Subir reporte consolidado
        uses: actions/upload-artifact@v4
        with:
          name: all-reports
          path: all-reports/
          retention-days: 30
